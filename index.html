        function calcDays(code){const y=parseInt(code.substring(0,4)),m=parseInt(code.substring(4,6));const start=new Date(y,m-1,1);const end=new Date(2026,4,31);return Math.floor((end-start)/(1000*60*60*24));}

        function buildPages(data,name){const track=document.getElementById('swipeTrack');if(!track)return;track.innerHTML='';const days=calcDays(data.code);

        function buildPage(idx,html,cb){const p=document.createElement('div');p.className='swipe-page';p.setAttribute('data-page',idx);p.innerHTML=html;if(cb)requestAnimationFrame(cb);return p}

        function bindSwipe(){const wrapper=document.getElementById('swipeWrapper');if(!wrapper)return;const nw=wrapper.cloneNode(true);wrapper.parentNode.replaceChild(nw,wrapper);const w=document.getElementById('swipeWrapper');w.addEventListener('touchstart',e=>{touchStartX=e.touches[0].clientX;touchStartY=e.touches[0].clientY;isSwiping=true},{passive:true});w.addEventListener('touchmove',e=>{if(!isSwiping)return;const dx=Math.abs(e.touches[0].clientX-touchStartX),dy=Math.abs(e.touches[0].clientY-touchStartY);if(dx>dy&&dx>10)e.preventDefault()},{passive:false});w.addEventListener('touchend',e=>{if(!isSwiping)return;isSwiping=false;const dx=e.changedTouches[0].clientX-touchStartX,dy=Math.abs(e.changedTouches[0].clientY-touchStartY);if(Math.abs(dx)<30||Math.abs(dx)<dy)return;if(dx<-40&&currentPage<totalPages-1)goToPage(currentPage+1);else if(dx>40&&currentPage>0)goToPage(currentPage-1)},{passive:true})}

        function selectOpt(sel,cor,exp,cid){const c=document.getElementById(cid);c.querySelectorAll('.quiz-opt').forEach((o,i)=>{o.style.pointerEvents='none';if(i===cor)o.classList.add('chosen-correct');if(i===sel&&i!==cor)o.classList.add('chosen-wrong')});if(sel===cor)quizScore++;const fb=document.getElementById('fb_'+cid);fb.innerHTML=`<p style="font-weight:600;color:#4D3D60;">${sel===cor?'✅ 正确！':'❌ 记错了'}</p><p style="color:#6B5B80;font-size:11px;margin:3px 0;">${exp}</p><button class="btn-next-q" id="nxt_${cid}">下一题 →</button>`;fb.classList.add('show');document.getElementById('nxt_'+cid).addEventListener('click',()=>{quizIndex++;showQ((currentData.quiz||[])[quizIndex]||null,cid)})}

                    <div class="ticket-seal-big">🎫</div>
                    <div class="ticket-souvenir"><div class="souv-names">沈立文 × ${name}</div><div class="souv-tag">${data.tag}</div><div class="souv-meta">${data.souvenirMeta||''}</div></div>
                    <div class="ticket-body">${data.sayWords||'愿青春不散场，来日皆可期。'}</div>
                    <div class="ticket-sign">— 沈立文</div>
                    <div class="ticket-stars">✦ ✦ ✦ ✦ ✦</div>
                </div>
                <div class="ticket-tear-bottom"></div>
            </div>`;document.body.appendChild(overlay);
            const close=()=>{overlay.remove();setParticleSpeed(1);};document.getElementById('ticketClose').addEventListener('click',close);overlay.addEventListener('click',e=>{if(e.target===overlay)close()});let sx=0;document.getElementById('ticketPaper').addEventListener('touchstart',e=>{sx=e.touches[0].clientX},{passive:true});document.getElementById('ticketPaper').addEventListener('touchend',e=>{if(e.changedTouches[0].clientX-sx>60)close()},{passive:true})}
        function setParticleSpeed(mult){particleSpeedMultiplier=mult}

        (function initParticles(){const canvas=document.getElementById('particleCanvas');const ctx=canvas.getContext('2d');let w,h;const particles=[];const maxP=45;const colors=['#6CB4EE','#7B8CFF','#A78BFA','#D4A5FF','#FF9A9E','#FFB7B2','#FFCD56','#81D4FA','#CE93D8','#90CAF9'];function rs(){w=window.innerWidth;h=window.innerHeight;canvas.width=w;canvas.height=h}function mk(){return{x:Math.random()*w,y:h+Math.random()*60,size:Math.random()*3+1.2,speedY:Math.random()*.45+.2,speedX:(Math.random()-.5)*.25,color:colors[Math.floor(Math.random()*colors.length)],opacity:Math.random()*.55+.3,pulse:Math.random()*Math.PI*2,pulseSpeed:Math.random()*.025+.01}}function init(){rs();for(let i=0;i<maxP;i++){const p=mk();p.y=Math.random()*h;particles.push(p)}}function draw(p){p.pulse+=p.pulseSpeed;const s=p.size*(1+Math.sin(p.pulse)*.3),o=p.opacity*(.5+Math.sin(p.pulse)*.5);const g1=ctx.createRadialGradient(p.x,p.y,0,p.x,p.y,s*7);g1.addColorStop(0,p.color+'55');g1.addColorStop(.4,p.color+'18');g1.addColorStop(1,'transparent');ctx.globalAlpha=o*.45;ctx.fillStyle=g1;ctx.beginPath();ctx.arc(p.x,p.y,s*7,0,Math.PI*2);ctx.fill();const g2=ctx.createRadialGradient(p.x,p.y,0,p.x,p.y,s*2.5);g2.addColorStop(0,p.color+'DD');g2.addColorStop(.4,p.color+'80');g2.addColorStop(1,'transparent');ctx.globalAlpha=o;ctx.fillStyle=g2;ctx.beginPath();ctx.arc(p.x,p.y,s*2.5,0,Math.PI*2);ctx.fill();ctx.globalAlpha=o*.85;ctx.fillStyle='#FFF';ctx.beginPath();ctx.arc(p.x,p.y,s*.5,0,Math.PI*2);ctx.fill();ctx.globalAlpha=1}function upd(p){p.y-=p.speedY*particleSpeedMultiplier;p.x+=p.speedX*(particleSpeedMultiplier>1?1.5:1);if(p.y<-20){p.y=h+Math.random()*40;p.x=Math.random()*w;p.color=colors[Math.floor(Math.random()*colors.length)]}if(p.x<-20)p.x=w+20;if(p.x>w+20)p.x=-20}function animate(){ctx.clearRect(0,0,w,h);ctx.fillStyle='rgba(254,252,249,.03)';ctx.fillRect(0,0,w,h);for(const p of particles){upd(p);draw(p)}requestAnimationFrame(animate)}window.addEventListener('resize',()=>{rs();particles.length=0;for(let i=0;i<maxP;i++)particles.push(mk())});init();animate();})();
        (function initSparks(){const c=document.getElementById('sparksContainer');if(!c)return;const cls=['#FFCD56','#FF9A9E','#6CB4EE','#D4A5FF','#A8D8C8'];for(let i=0;i<20;i++){const s=document.createElement('div');s.className='shutter-spark';const a=Math.random()*Math.PI*2,d=Math.random()*100+40;s.style.setProperty('--dx',Math.cos(a)*d+'px');s.style.setProperty('--dy',Math.sin(a)*d+'px');s.style.animationDelay=Math.random()*.35+'s';s.style.top='50%';s.style.left='50%';s.style.background=cls[Math.floor(Math.random()*cls.length)];s.style.boxShadow=`0 0 12px 4px ${s.style.background}`;c.appendChild(s)}})();
        (function initStars(){const c=document.getElementById('starsContainer');if(!c)return;for(let i=0;i<16;i++){const s=document.createElement('div');s.className='star-burst';const a=Math.random()*Math.PI*2,d=Math.random()*140+60;s.style.setProperty('--sx',Math.cos(a)*d+'px');s.style.setProperty('--sy',Math.sin(a)*d+'px');s.style.animationDelay=Math.random()*.4+.15+'s';s.style.top='50%';s.style.left='50%';const sz=Math.random()*4+2;s.style.width=sz+'px';s.style.height=sz+'px';c.appendChild(s)}})();
        setTimeout(()=>{const c=document.getElementById('cameraStage');if(c)c.remove()},5200);
        document.getElementById('nameInput').addEventListener('keypress',e=>{if(e.key==='Enter')unlock()});
        document.getElementById('timeInput').addEventListener('keypress',e=>{if(e.key==='Enter')unlock()});
    </script>
