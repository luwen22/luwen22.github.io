<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>你在沈立文的大学里扮演什么角色？</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --cream:#FEFCF7;--ink:#1C1A2E;--ink-soft:#3D3852;--ink-muted:#7B7494;
  --gold:#C8A96E;--gold-light:#E8D5A3;--gold-pale:#FBF5E6;
  --lavender:#A89BC2;--lavender-light:#D4CCEA;--lavender-pale:#F0EDF7;
  --rose:#E8A5A0;--rose-light:#F5D0CD;--rose-pale:#FDF0EF;
  --sage:#8BAF9A;--sage-light:#C2D9CC;--sage-pale:#EFF5F2;
  --sky:#89B4CC;--sky-light:#C2DCEC;--sky-pale:#EBF4F9;
  --film-h:38px;--radius:18px;--radius-sm:10px;
}
html,body{height:100%;overflow:hidden}
body{font-family:'Noto Serif SC','PingFang SC','STSong',Georgia,serif;background:var(--cream);color:var(--ink);-webkit-tap-highlight-color:transparent;-webkit-font-smoothing:antialiased;user-select:none;-webkit-user-select:none;position:relative}

/* ── GRAIN OVERLAY ── */
body::before{content:'';position:fixed;inset:0;z-index:1000;pointer-events:none;opacity:.025;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='1'/%3E%3C/svg%3E");background-size:256px}

/* ── FILM STRIP DECO ── */
.film-strip-deco{position:fixed;left:0;right:0;height:var(--film-h);background:#1a1520;z-index:5;pointer-events:none}
.film-strip-deco.top{top:0}
.film-strip-deco.bot{bottom:0}
.film-strip-deco::after{content:'';position:absolute;inset:0;background:repeating-linear-gradient(90deg,transparent 0,transparent 22px,rgba(255,255,255,.15) 22px,rgba(255,255,255,.15) 26px);mask-image:linear-gradient(to bottom,transparent,rgba(0,0,0,.4) 30%,rgba(0,0,0,.4) 70%,transparent)}
.film-perf{position:absolute;top:50%;transform:translateY(-50%);display:flex;gap:14px;left:8px}
.film-perf span{width:10px;height:18px;border-radius:3px;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.12);display:block;flex-shrink:0}

/* ── STAGES ── */
.stage{position:fixed;inset:0;display:none;flex-direction:column;align-items:center;justify-content:center;z-index:10;padding:calc(var(--film-h) + 12px) 20px}
.stage.active{display:flex}

/* ── PARTICLES CANVAS ── */
#particleCanvas{position:fixed;inset:0;z-index:2;pointer-events:none}

/* ── COVER STAGE ── */
#coverStage{gap:0}
.cover-inner{position:relative;z-index:3;width:100%;max-width:360px;display:flex;flex-direction:column;align-items:center;gap:16px;animation:fadeUp .8s 4.0s both}

/* Camera intro */
.camera-intro{position:fixed;inset:0;z-index:50;pointer-events:none;display:flex;align-items:center;justify-content:center}
.cam-icon{font-size:80px;animation:camIn 4s cubic-bezier(.22,.61,.36,1) forwards;filter:drop-shadow(0 0 40px rgba(200,169,110,.5))}
@keyframes camIn{0%{transform:scale(0) rotate(-30deg);opacity:0}10%{transform:scale(1.3) rotate(5deg);opacity:1}22%{transform:scale(1) rotate(0);opacity:1}60%{transform:scale(1);opacity:1}75%{transform:scale(.7);opacity:.4}100%{transform:scale(0);opacity:0}}
.flash-layer{position:fixed;inset:0;background:#fff;opacity:0;z-index:55;pointer-events:none;animation:flashPop 3.8s forwards}
@keyframes flashPop{0%{opacity:0}8%{opacity:.85}22%{opacity:0}100%{opacity:0}}

.cover-badge{font-size:11px;letter-spacing:4px;color:var(--gold);text-transform:uppercase;opacity:0;animation:fadeIn .6s 4.2s both}
.cover-logo{font-size:48px;animation:logoIn .8s 4.3s both;filter:drop-shadow(0 4px 12px rgba(200,169,110,.3))}
@keyframes logoIn{from{transform:scale(.5) rotate(-15deg);opacity:0}to{transform:scale(1) rotate(0);opacity:1}}
.divider-line{width:80px;height:1px;background:linear-gradient(90deg,transparent,var(--gold),transparent);opacity:0;animation:fadeIn .6s 4.5s both}
.cover-title{font-size:22px;font-weight:700;color:var(--ink);line-height:1.8;letter-spacing:1px;text-align:center;opacity:0;animation:fadeUp .7s 4.6s both}
.cover-title em{color:var(--gold);font-style:normal;font-weight:800}
.cover-sub{font-size:12px;color:var(--ink-muted);line-height:1.8;text-align:center;opacity:0;animation:fadeUp .7s 4.8s both}
.cover-sub b{color:var(--gold)}
.cover-inputs{width:100%;display:flex;flex-direction:column;gap:10px;opacity:0;animation:fadeUp .7s 5.0s both}
.c-input{width:100%;height:48px;border:1.5px solid var(--lavender-light);border-radius:var(--radius);background:rgba(255,255,255,.7);backdrop-filter:blur(8px);padding:0 18px;font-size:14px;font-family:inherit;color:var(--ink);outline:none;transition:all .25s}
.c-input:focus{border-color:var(--gold);background:#fff;box-shadow:0 0 0 3px rgba(200,169,110,.12)}
.c-input::placeholder{color:var(--ink-muted)}
.c-btn{width:100%;height:50px;border:none;border-radius:var(--radius);background:linear-gradient(135deg,var(--gold) 0%,#B8944A 100%);color:#fff;font-size:15px;font-weight:700;font-family:inherit;cursor:pointer;letter-spacing:1px;transition:all .2s;box-shadow:0 4px 20px rgba(200,169,110,.4)}
.c-btn:active{transform:scale(.97);box-shadow:0 2px 10px rgba(200,169,110,.3)}
.cover-footer{font-size:10px;color:var(--ink-muted);opacity:0;animation:fadeIn .6s 5.5s both;letter-spacing:.5px}

/* ── LOADING ── */
#loadingStage{gap:16px;background:var(--cream)}
.loading-film{display:flex;gap:6px;align-items:center}
.lf-frame{width:28px;height:36px;border-radius:3px;background:var(--lavender-light);animation:lfPulse 1.2s ease-in-out infinite}
.lf-frame:nth-child(2){animation-delay:.2s;background:var(--gold-light)}
.lf-frame:nth-child(3){animation-delay:.4s;background:var(--rose-light)}
@keyframes lfPulse{0%,100%{transform:scaleY(1);opacity:.6}50%{transform:scaleY(1.3);opacity:1}}
.loading-text{font-size:13px;color:var(--ink-muted);letter-spacing:2px}

/* ── ENVELOPE ── */
#envelopeStage{background:radial-gradient(ellipse at 50% 30%,var(--lavender-pale),var(--cream))}
.env-wrap{width:100%;max-width:340px}
.env-card{background:linear-gradient(145deg,#fff 0%,var(--gold-pale) 100%);border-radius:24px;padding:36px 28px 32px;box-shadow:0 8px 40px rgba(0,0,0,.08),0 1px 0 rgba(255,255,255,.8) inset,0 0 0 1px rgba(200,169,110,.2);position:relative;overflow:hidden;text-align:center}
.env-card::before{content:'';position:absolute;top:-60px;right:-60px;width:160px;height:160px;border-radius:50%;background:radial-gradient(circle,rgba(200,169,110,.15),transparent 70%)}
.env-seal{font-size:44px;margin-bottom:12px;display:block;animation:sealBob 3s ease-in-out infinite}
@keyframes sealBob{0%,100%{transform:translateY(0)}50%{transform:translateY(-5px)}}
.env-badge{font-size:10px;letter-spacing:3px;color:var(--gold);text-transform:uppercase;margin-bottom:6px}
.env-name{font-size:28px;font-weight:800;color:var(--ink);margin-bottom:4px}
.env-tagline{font-size:13px;color:var(--ink-muted);margin-bottom:24px;line-height:1.6}
.env-btn{width:100%;height:48px;border:2px solid var(--gold);border-radius:var(--radius);background:transparent;color:var(--gold);font-size:14px;font-weight:700;font-family:inherit;cursor:pointer;transition:all .25s;letter-spacing:1px}
.env-btn:hover,.env-btn:active{background:var(--gold);color:#fff;transform:scale(.98)}

/* ── SWIPE STAGE ── */
#swipeStage{padding:calc(var(--film-h) + 8px) 0 calc(var(--film-h) + 8px);justify-content:flex-start;gap:0}
.progress-area{width:100%;padding:8px 20px 6px;flex-shrink:0;position:relative;z-index:3}
.prog-bar-outer{height:2px;background:var(--lavender-light);border-radius:2px;overflow:hidden;margin-bottom:6px}
.prog-bar-inner{height:100%;background:linear-gradient(90deg,var(--gold),var(--lavender));border-radius:2px;transition:width .4s cubic-bezier(.22,.61,.36,1)}
.prog-labels{display:flex;justify-content:space-between;font-size:9px;color:var(--ink-muted);letter-spacing:.5px}
.prog-labels span.cur{color:var(--gold);font-weight:700}
.swipe-hint{font-size:9px;color:var(--lavender);position:absolute;right:20px;top:8px}

.swipe-wrap{flex:1;overflow:hidden;width:100%}
.swipe-track{display:flex;height:100%;will-change:transform;transition:transform .4s cubic-bezier(.22,.61,.36,1)}
.swipe-page{flex:0 0 100%;width:100%;height:100%;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;padding:10px 16px 20px;scroll-behavior:smooth}
.swipe-page::-webkit-scrollbar{display:none}

/* ── CARDS ── */
.g-card{background:rgba(255,255,255,.75);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);border-radius:var(--radius);border:1px solid rgba(200,169,110,.18);box-shadow:0 2px 16px rgba(0,0,0,.05);padding:18px 16px;margin-bottom:12px;position:relative;overflow:hidden}
.g-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--gold),var(--lavender),var(--rose));opacity:.4}
.sec-head{display:flex;align-items:center;gap:8px;font-size:12px;font-weight:700;color:var(--gold);letter-spacing:1px;margin-bottom:14px;text-transform:uppercase}

/* Days card */
.days-card{background:linear-gradient(135deg,var(--ink) 0%,#2D2545 100%);border-radius:var(--radius);padding:24px 20px;margin-bottom:12px;position:relative;overflow:hidden;text-align:center}
.days-card::after{content:'';position:absolute;inset:0;background:url("data:image/svg+xml,%3Csvg width='40' height='40' viewBox='0 0 40 40' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='%23ffffff' fill-opacity='0.03'%3E%3Cpath d='M20 3l2.5 7.5H30l-6.5 4.5 2.5 7.5-6.5-5-6.5 5 2.5-7.5L9 10.5h7.5z'/%3E%3C/g%3E%3C/svg%3E");pointer-events:none}
.days-num{font-size:72px;font-weight:900;color:var(--gold);line-height:1;letter-spacing:-2px;font-variant-numeric:tabular-nums}
.days-label{font-size:12px;color:rgba(255,255,255,.5);letter-spacing:3px;margin-top:4px}
.days-sub{font-size:10px;color:rgba(255,255,255,.3);margin-top:2px}

/* Film cards */
.film-card{border-radius:var(--radius-sm);border:1px solid rgba(200,169,110,.15);background:rgba(255,255,255,.5);margin-bottom:8px;overflow:hidden;transition:all .3s}
.film-card-header{display:flex;align-items:center;gap:10px;padding:10px 12px;cursor:pointer}
.film-card-icon{font-size:22px;flex-shrink:0}
.film-card-title{font-size:13px;font-weight:700;color:var(--ink)}
.film-card-date{font-size:10px;color:var(--gold);margin-left:auto;flex-shrink:0;letter-spacing:.5px}
.film-card-desc{font-size:12px;color:var(--ink-soft);line-height:1.7;padding:0 12px 12px;display:none}
.film-card.open .film-card-desc{display:block}
.film-card.open{border-color:rgba(200,169,110,.3);background:rgba(255,255,255,.8)}

/* Timeline */
.timeline-wrap{overflow-x:auto;padding-bottom:8px;margin-top:4px}
.timeline-wrap::-webkit-scrollbar{height:2px;background:var(--lavender-light)}
.timeline-wrap::-webkit-scrollbar-thumb{background:var(--gold);border-radius:2px}
.timeline-svg{display:block;min-width:320px}

/* Role card */
.role-icon-big{font-size:64px;display:block;text-align:center;margin-bottom:6px;animation:roleBob 4s ease-in-out infinite}
@keyframes roleBob{0%,100%{transform:translateY(0) rotate(-3deg)}50%{transform:translateY(-6px) rotate(3deg)}}
.role-name{font-size:22px;font-weight:800;color:var(--ink);text-align:center;margin-bottom:4px}
.role-desc{font-size:12px;color:var(--ink-muted);line-height:1.8;text-align:center}

/* Keyword chips */
.kw-chips{display:flex;flex-wrap:wrap;gap:7px;margin-bottom:12px}
.kw-chip{padding:5px 14px;border-radius:50px;background:var(--lavender-pale);border:1px solid var(--lavender-light);font-size:12px;color:var(--lavender);cursor:pointer;transition:all .2s}
.kw-chip.active,.kw-chip:active{background:var(--lavender);color:#fff;border-color:var(--lavender)}
.kw-detail{font-size:12px;color:var(--ink-soft);line-height:1.7;padding:10px 12px;background:var(--lavender-pale);border-radius:var(--radius-sm);margin-top:4px;display:none;animation:fadeIn .2s both}
.kw-detail.show{display:block}

/* Spectrum */
.spectrum-wrap{margin-top:4px}
.spectrum-eval{font-size:12px;color:var(--ink-soft);line-height:1.8;margin-bottom:12px}
.factor-row{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.factor-name{font-size:11px;color:var(--ink-muted);width:64px;flex-shrink:0}
.factor-bar-bg{flex:1;height:6px;background:var(--lavender-pale);border-radius:3px;overflow:hidden}
.factor-bar-fill{height:100%;background:linear-gradient(90deg,var(--gold),var(--lavender));border-radius:3px;width:0;transition:width 1s cubic-bezier(.22,.61,.36,1)}
.factor-pct{font-size:10px;color:var(--gold);width:28px;flex-shrink:0;text-align:right}
.spectrum-conclusion{font-size:12px;color:var(--ink-muted);line-height:1.7;margin-top:8px;padding:10px 12px;background:var(--gold-pale);border-radius:var(--radius-sm);border-left:3px solid var(--gold)}

/* Quiz */
.quiz-q{font-size:14px;font-weight:700;color:var(--ink);line-height:1.7;margin-bottom:14px}
.quiz-opt{padding:12px 16px;border-radius:var(--radius-sm);border:1.5px solid var(--lavender-light);background:rgba(255,255,255,.6);font-size:13px;color:var(--ink-soft);margin-bottom:8px;cursor:pointer;transition:all .2s;line-height:1.5}
.quiz-opt:active{background:var(--lavender-pale)}
.quiz-opt.correct{border-color:var(--sage);background:var(--sage-pale);color:var(--sage)}
.quiz-opt.wrong{border-color:var(--rose);background:var(--rose-pale);color:var(--rose)}
.quiz-fb{font-size:12px;color:var(--ink-soft);line-height:1.7;padding:10px 12px;background:var(--gold-pale);border-radius:var(--radius-sm);display:none;margin-top:4px;animation:fadeIn .3s both}
.quiz-fb.show{display:block}
.quiz-next{margin-top:8px;padding:8px 20px;border:1.5px solid var(--gold);border-radius:50px;background:transparent;color:var(--gold);font-size:12px;font-family:inherit;cursor:pointer;transition:all .2s}
.quiz-next:active{background:var(--gold);color:#fff}
.quiz-final{text-align:center;padding:20px 0}
.quiz-score{font-size:56px;font-weight:900;color:var(--gold);line-height:1}
.quiz-score-msg{font-size:13px;color:var(--ink-muted);margin-top:8px;line-height:1.6}

/* Message */
.msg-ta{width:100%;height:80px;border:1.5px solid var(--lavender-light);border-radius:var(--radius-sm);background:rgba(255,255,255,.7);padding:12px;font-size:13px;font-family:inherit;color:var(--ink);outline:none;resize:none;transition:border .25s}
.msg-ta:focus{border-color:var(--gold)}
.msg-btn{width:100%;height:44px;border:none;border-radius:var(--radius-sm);background:linear-gradient(135deg,var(--gold),#B8944A);color:#fff;font-size:14px;font-weight:700;font-family:inherit;cursor:pointer;margin-top:10px;letter-spacing:1px;transition:all .2s}
.msg-btn:active{transform:scale(.97)}
.msg-list{margin-top:12px;display:flex;flex-direction:column;gap:8px}
.msg-item{padding:10px 12px;border-radius:var(--radius-sm);background:var(--lavender-pale);border:1px solid var(--lavender-light)}
.msg-author{font-size:10px;font-weight:700;color:var(--lavender);margin-bottom:3px;letter-spacing:.5px}
.msg-text{font-size:12px;color:var(--ink-soft);line-height:1.7}

/* Ticket */
.ticket-card{background:linear-gradient(145deg,var(--ink) 0%,#2D2545 100%);border-radius:var(--radius);padding:28px 24px;text-align:center;margin-bottom:12px;position:relative;overflow:hidden;cursor:pointer;transition:transform .2s}
.ticket-card:active{transform:scale(.98)}
.ticket-card::after{content:'';position:absolute;inset:0;background:repeating-linear-gradient(45deg,transparent,transparent 10px,rgba(255,255,255,.01) 10px,rgba(255,255,255,.01) 20px)}
.ticket-icon{font-size:36px;display:block;margin-bottom:8px}
.ticket-label{font-size:11px;color:rgba(255,255,255,.5);letter-spacing:3px}

/* Ticket overlay */
.ticket-overlay{position:fixed;inset:0;z-index:100;background:rgba(0,0,0,.6);backdrop-filter:blur(8px);display:flex;align-items:center;justify-content:center;padding:40px 20px;animation:fadeIn .3s both}
.ticket-paper{background:linear-gradient(145deg,#fff 0%,var(--gold-pale) 100%);border-radius:24px;width:100%;max-width:320px;padding:32px 24px 28px;position:relative;box-shadow:0 20px 60px rgba(0,0,0,.3),0 0 0 1px rgba(200,169,110,.3)}
.ticket-paper::before{content:'';position:absolute;left:50%;top:-12px;transform:translateX(-50%);width:80px;height:24px;background:var(--gold-pale);border-radius:0 0 12px 12px;border:1px solid rgba(200,169,110,.3)}
.ticket-close{position:absolute;top:14px;right:14px;width:28px;height:28px;border:none;border-radius:50%;background:rgba(0,0,0,.08);color:var(--ink-muted);font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.ticket-role-icon{font-size:48px;display:block;margin-bottom:6px}
.ticket-role-label{font-size:20px;font-weight:800;color:var(--ink);margin-bottom:8px}
.ticket-kw{display:flex;flex-wrap:wrap;gap:5px;justify-content:center;margin-bottom:14px}
.ticket-kw span{padding:3px 10px;border-radius:50px;background:var(--lavender-pale);color:var(--lavender);font-size:10px;border:1px solid var(--lavender-light)}
.ticket-dashes{border:none;border-top:2px dashed rgba(200,169,110,.3);margin:14px 0}
.ticket-souvenir{margin-bottom:12px}
.souvenir-names{font-size:15px;font-weight:700;color:var(--ink);margin-bottom:3px}
.souvenir-tag{font-size:11px;color:var(--gold);letter-spacing:.5px;margin-bottom:4px}
.souvenir-meta{font-size:11px;color:var(--ink-muted);line-height:1.7}
.ticket-words{font-size:13px;color:var(--ink-soft);line-height:1.8;font-style:italic;margin-bottom:10px}
.ticket-sign{font-size:11px;color:var(--ink-muted);text-align:right}
.ticket-stars{color:var(--gold);font-size:12px;text-align:center;letter-spacing:6px;margin-top:10px}

/* Footer */
.page-footer{text-align:center;font-size:10px;color:var(--ink-muted);padding:8px 0 4px;line-height:1.8;letter-spacing:.5px}

/* Toast */
.toast{position:fixed;top:55px;left:50%;transform:translateX(-50%);background:rgba(28,26,46,.9);backdrop-filter:blur(12px);color:var(--gold-light);padding:10px 22px;border-radius:50px;font-size:13px;z-index:200;pointer-events:none;animation:fadeIn .3s both;white-space:nowrap;border:1px solid rgba(200,169,110,.3)}

/* Ripple */
.ripple{position:fixed;border-radius:50%;pointer-events:none;z-index:999;background:rgba(200,169,110,.25);animation:rippleOut .5s ease-out forwards}
@keyframes rippleOut{0%{width:0;height:0;opacity:.5}100%{width:80px;height:80px;margin-left:-40px;margin-top:-40px;opacity:0}}

/* Paper plane */
.paper-plane{position:fixed;font-size:20px;z-index:99;pointer-events:none;animation:planeFly 1.4s ease-in forwards}
@keyframes planeFly{0%{transform:translate(0,0) rotate(0)}100%{transform:translate(200px,-300px) rotate(30deg);opacity:0}}

/* Music btn */
#musicBtn{position:fixed;bottom:calc(var(--film-h) + 12px);right:16px;z-index:20;width:38px;height:38px;border-radius:50%;background:rgba(255,255,255,.7);border:1px solid rgba(200,169,110,.3);font-size:16px;cursor:pointer;backdrop-filter:blur(8px);box-shadow:0 2px 10px rgba(0,0,0,.08);transition:all .25s;display:flex;align-items:center;justify-content:center}
#musicBtn:active{transform:scale(.9)}

/* AI Generator */
.ai-gen-panel{position:fixed;inset:0;z-index:150;background:rgba(0,0,0,.7);backdrop-filter:blur(10px);display:none;flex-direction:column;align-items:center;justify-content:flex-start;padding:calc(var(--film-h) + 16px) 16px calc(var(--film-h) + 20px);overflow-y:auto}
.ai-gen-panel.show{display:flex}
.ai-gen-box{background:#fff;border-radius:24px;width:100%;max-width:360px;padding:24px 20px;box-shadow:0 12px 40px rgba(0,0,0,.2)}
.ai-gen-title{font-size:16px;font-weight:800;color:var(--ink);margin-bottom:4px;text-align:center}
.ai-gen-sub{font-size:11px;color:var(--ink-muted);text-align:center;margin-bottom:16px;line-height:1.6}
.ai-field{margin-bottom:12px}
.ai-field label{font-size:11px;font-weight:700;color:var(--ink-soft);letter-spacing:.5px;display:block;margin-bottom:5px}
.ai-input{width:100%;border:1.5px solid var(--lavender-light);border-radius:var(--radius-sm);padding:10px 14px;font-size:13px;font-family:inherit;color:var(--ink);outline:none;background:#fafafa;transition:border .2s;resize:none}

function showStage(id){
  ['coverStage','loadingStage','envelopeStage','swipeStage'].forEach(s=>{
    document.getElementById(s).classList.remove('active');
    document.getElementById(s).style.display='none';
  });
  const el=document.getElementById(id);
  el.style.display='flex';
  el.classList.add('active');
}
function showToast(msg){
  document.querySelector('.toast')?.remove();
  const t=document.createElement('div');t.className='toast';t.textContent=msg;
  document.body.appendChild(t);setTimeout(()=>t.remove(),2500);
}
function toggleMusic(){
  const m=document.getElementById('bgMusic'),btn=document.getElementById('musicBtn');
  if(musicOn){m.pause();btn.textContent='🎵'}
  else{m.play().catch(()=>{});btn.textContent='🎶'}
  musicOn=!musicOn;
}
function calcDays(code){
  const y=parseInt(code.slice(0,4)),mo=parseInt(code.slice(4,6));
  const start=new Date(y,mo-1,1), end=new Date(2026,4,31);
  return Math.max(0,Math.floor((end-start)/86400000));
}

(function(){
  const canvas=document.getElementById('particleCanvas');
  const ctx=canvas.getContext('2d');
  const colors=['#C8A96E','#A89BC2','#E8A5A0','#8BAF9A','#89B4CC','#E8D5A3'];
  let w,h,particles=[];
  function resize(){w=canvas.width=innerWidth;h=canvas.height=innerHeight}
  function mk(){return{x:Math.random()*w,y:h+30+Math.random()*60,size:Math.random()*2+.8,speedY:Math.random()*.4+.15,speedX:(Math.random()-.5)*.2,color:colors[0|Math.random()*colors.length],opacity:Math.random()*.4+.2,pulse:Math.random()*Math.PI*2,ps:Math.random()*.02+.008}}
  function init(){resize();for(let i=0;i<40;i++){const p=mk();p.y=Math.random()*h;particles.push(p)}}
  function loop(){
    ctx.clearRect(0,0,w,h);
    for(const p of particles){
      p.pulse+=p.ps;p.y-=p.speedY;p.x+=p.speedX;
      if(p.y<-20){p.y=h+30;p.x=Math.random()*w;p.color=colors[0|Math.random()*colors.length]}
      if(p.x<-20)p.x=w+20;if(p.x>w+20)p.x=-20;
      const s=p.size*(1+Math.sin(p.pulse)*.25);
      const g=ctx.createRadialGradient(p.x,p.y,0,p.x,p.y,s*6);
      g.addColorStop(0,p.color+'44');g.addColorStop(1,'transparent');
      ctx.globalAlpha=p.opacity*.4;ctx.fillStyle=g;ctx.beginPath();ctx.arc(p.x,p.y,s*6,0,Math.PI*2);ctx.fill();
      const g2=ctx.createRadialGradient(p.x,p.y,0,p.x,p.y,s*2);
      g2.addColorStop(0,p.color+'CC');g2.addColorStop(1,'transparent');
      ctx.globalAlpha=p.opacity;ctx.fillStyle=g2;ctx.beginPath();ctx.arc(p.x,p.y,s*2,0,Math.PI*2);ctx.fill();
      ctx.globalAlpha=p.opacity*.8;ctx.fillStyle='#fff';ctx.beginPath();ctx.arc(p.x,p.y,s*.4,0,Math.PI*2);ctx.fill();
      ctx.globalAlpha=1;
    }
    requestAnimationFrame(loop);
  }
  window.addEventListener('resize',()=>{resize();particles=[];for(let i=0;i<40;i++){const p=mk();p.y=Math.random()*h;particles.push(p)}});
  init();loop();
})();

function buildTimeline(role){
  if(!role.timeline||!role.timeline.length)return'';
  const pts=role.timeline;
  const W=320,H=180,padX=20,padY=30;
  const xs=pts.map((_,i)=>padX+i*(W-padX*2)/(pts.length-1||1));
  // simple flat line going up slightly
  const ys=pts.map((_,i)=>H-padY-i*((H-padY*2)/(pts.length-1||1))*.6);
  const lineD=xs.map((x,i)=>`${i===0?'M':'L'}${x},${ys[i]}`).join(' ');
  const nodes=pts.map((p,i)=>`
    <g>
      <circle cx="${xs[i]}" cy="${ys[i]}" r="8" fill="var(--gold)" opacity=".3"/>
      <circle cx="${xs[i]}" cy="${ys[i]}" r="4" fill="var(--gold)"/>
      <text x="${xs[i]}" y="${ys[i]+18}" text-anchor="middle" font-size="8" fill="var(--gold)" font-family="inherit">${p.t}</text>
      <text x="${xs[i]}" y="${ys[i]+27}" text-anchor="middle" font-size="9" fill="var(--ink-soft)" font-family="inherit">${p.e}</text>
    </g>`).join('');
  return`<div class="g-card">
    <div class="sec-head">⭐ 重要节点</div>
    <div class="timeline-wrap">
      <svg class="timeline-svg" viewBox="0 0 320 ${H}" xmlns="http://www.w3.org/2000/svg">
        <path d="${lineD}" fill="none" stroke="var(--gold)" stroke-width="2" stroke-dasharray="4,3" opacity=".5"/>
        ${nodes}
      </svg>
    </div>
    <p style="font-size:11px;color:var(--ink-muted);margin-top:4px;line-height:1.6">${role.shape||''}</p>
  </div>`;
}

function animDays(target){
  const el=document.getElementById('daysNum');
  if(!el)return;
  let c=0;const step=Math.max(1,Math.ceil(target/60));
  const iv=setInterval(()=>{c=Math.min(c+step,target);el.textContent=c;if(c>=target)clearInterval(iv)},30);
}

function animFactorBars(){

// ──────────────────────────────────────
//  SWIPE
// ──────────────────────────────────────
function bindSwipe(){
  const wr=document.getElementById('swipeWrap');
  wr.addEventListener('touchstart',e=>{touchStartX=e.touches[0].clientX;touchStartY=e.touches[0].clientY;isSwiping=true},{passive:true});
  wr.addEventListener('touchmove',e=>{
    if(!isSwiping)return;
    const dx=Math.abs(e.touches[0].clientX-touchStartX),dy=Math.abs(e.touches[0].clientY-touchStartY);
    if(dx>dy&&dx>10)e.preventDefault();
  },{passive:false});
  wr.addEventListener('touchend',e=>{
    if(!isSwiping)return;isSwiping=false;
    const dx=e.changedTouches[0].clientX-touchStartX,dy=Math.abs(e.changedTouches[0].clientY-touchStartY);
    if(Math.abs(dx)<30||Math.abs(dx)<dy)return;
    if(dx<-40&&currentPage<totalPages-1)goToPage(currentPage+1);
    else if(dx>40&&currentPage>0)goToPage(currentPage-1);
  },{passive:true});
}
function goToPage(idx){
  if(idx<0||idx>=totalPages)return;
  currentPage=idx;
  document.getElementById('swipeTrack').style.transform=`translateX(-${idx*100}%)`;
  updateProgress(idx);
  if(idx===1)setTimeout(animFactorBars,400);
}
function updateProgress(idx){
  document.getElementById('progBar').style.width=`${(idx+1)/totalPages*100}%`;
  document.querySelectorAll('#progLabels span').forEach((s,i)=>s.classList.toggle('cur',i===idx));
}

function renderQuiz(list,cid){
  quizIndex=0;quizScore=0;
  if(!list.length){document.getElementById(cid).innerHTML='<p style="color:var(--ink-muted);font-size:12px">暂无测试题目</p>';return}
  showQ(list[0],list,cid);
}
function showQ(q,list,cid){
  const c=document.getElementById(cid);if(!c)return;
  if(!q){
    const t=list.length;
    let msg=quizScore===t?'满分默契！彼此都是最重要的人 🎉':quizScore>=t/2?'默契拉满，专属回忆全部珍藏～':'回忆慢慢细数，友情细水长流';
    c.innerHTML=`<div class="quiz-final"><div class="quiz-score">${quizScore}/${t}</div><div class="quiz-score-msg">${msg}</div></div>`;return;
  }
  c.innerHTML=`<div class="quiz-q">${q.q}</div>${q.opts.map((o,i)=>`<span class="quiz-opt" data-i="${i}" data-ans="${q.ans}" data-exp="${encodeURIComponent(q.exp)}">${o}</span>`).join('')}<div class="quiz-fb" id="qfb"></div>`;
  c.querySelectorAll('.quiz-opt').forEach(o=>o.addEventListener('click',function(){
    const sel=+this.dataset.i,ans=+this.dataset.ans,exp=decodeURIComponent(this.dataset.exp);
    c.querySelectorAll('.quiz-opt').forEach((op,i)=>{
      op.style.pointerEvents='none';
      if(i===ans)op.classList.add('correct');
      if(i===sel&&i!==ans)op.classList.add('wrong');
    });
    if(sel===ans)quizScore++;
    const fb=document.getElementById('qfb');
    fb.innerHTML=`<p style="font-weight:700;margin-bottom:4px">${sel===ans?'✅ 正确！':'❌ 记错了'}</p><p>${exp}</p><button class="quiz-next" id="qnext">下一题 →</button>`;
    fb.classList.add('show');
    document.getElementById('qnext').onclick=()=>{quizIndex++;showQ(list[quizIndex]||null,list,cid)};
  }));
}

function submitMsg(){
  const inp=document.getElementById('msgInput');
  const t=inp.value.trim();if(!t){showToast('请输入留言内容');return}
  const list=document.getElementById('msgList');
  const item=document.createElement('div');item.className='msg-item';
  item.innerHTML=`<div class="msg-author">${currentName}</div><div class="msg-text">${t}</div>`;
  list.insertBefore(item,list.children[1]||null);
  inp.value='';
  localStorage.setItem('msg_'+currentName,list.innerHTML);
  spawnPlane();
}
function loadMsgs(){
  const saved=localStorage.getItem('msg_'+currentName);
  if(saved)document.getElementById('msgList').innerHTML=saved;
}
function spawnPlane(){
  const btn=document.querySelector('.msg-btn');if(!btn)return;
  const r=btn.getBoundingClientRect();
  const plane=document.createElement('div');plane.className='paper-plane';plane.textContent='✈️';
  plane.style.top=r.top+'px';plane.style.left=(r.right-30)+'px';
  document.body.appendChild(plane);setTimeout(()=>plane.remove(),1500);
}
