    <style>

        .star-burst{position:absolute;width:3px;height:3px;border-radius:50%;background:#fff;pointer-events:none;box-shadow:0 0 8px 3px rgba(220,200,240,.8);animation:starFly 3.6s ease-out forwards;opacity:0}

        @keyframes filmSlideTop{0%{opacity:0;transform:translateX(-100%)}10%{opacity:1;transform:translateX(0)}40%{opacity:.85;transform:translateX(0)}70%{opacity:.3;transform:translateX(0) translateY(-8px)}100%{opacity:0;transform:translateX(15%) translateY(-12px)}}

        .cover-input{width:100%;padding:14px 20px;font-size:15px;border:1.5px solid transparent;border-radius:14px;background:linear-gradient(#ffffff,#ffffff) padding-box,linear-gradient(135deg,#c6d4ff,#d9e1ff,#ead9ff) border-box;color:#3D3D50;text-align:center;outline:none;transition:all .3s ease;font-weight:500;box-shadow:0 8px 24px rgba(150,165,220,.12)}

        .cover-input-small:focus{transform:scale(1.01);background:linear-gradient(#FFFDFA,#FFFDFA) padding-box,linear-gradient(135deg,#B8A8D0,#C8B8E0,#D8C8E8,#C8B8E0,#B8A8D0) border-box;box-shadow:0 0 0 4px rgba(180,160,210,.06),0 4px 18px rgba(170,150,200,.12)}

        .film-bottom-line{width:42%;max-width:170px;height:1px;opacity:0;margin-top:-2px;background:linear-gradient(90deg,transparent,rgba(180,200,220,.4),rgba(200,195,225,.6),rgba(180,200,220,.4),transparent);animation:elegantLineIn .8s 5.4s ease forwards}
        .cover-btn{width:100%;padding:15px 28px;font-size:16px;font-weight:600;color:#fff;border:1px solid rgba(255,255,255,.4);border-radius:14px;cursor:pointer;transition:all .3s ease;letter-spacing:1px;position:relative;overflow:hidden;opacity:0;background:linear-gradient(135deg,#6f7dff,#8f8cff,#b293ff,#e0a1ff,#ffb3cb,#ffc872);background-size:220% 220%;box-shadow:0 12px 35px rgba(123,140,255,.35);animation:btnSlideIn .5s 5.5s cubic-bezier(.22,.61,.36,1) forwards,btnRainbowFlow 6s 6.2s ease infinite,btnGlowBreathe 2.5s 6.2s ease-in-out infinite}

        .app-stage{position:fixed;top:0;left:0;width:100%;height:100%;height:100dvh;display:none;z-index:1}

        function showQ(q,cid){const c=document.getElementById(cid);if(!c)return;if(!q){const t=currentData.quiz.length;let msg='';if(quizScore===t)msg='满分默契！彼此都是最重要的人 🎉';else if(quizScore>=t/2)msg='默契拉满，专属回忆全部珍藏～';else msg='回忆慢慢细数，友情细水长流';c.innerHTML=`<div class="quiz-final"><div class="quiz-score-big">${quizScore}/${t}</div><p style="color:#6B5B80;margin-top:6px;font-size:13px;">${msg}</p></div>`;return}c.innerHTML=`<div class="quiz-q">${q.q}</div>${q.opts.map((o,i)=>`<div class="quiz-opt" data-idx="${i}" data-correct="${q.ans}" data-exp="${q.exp.replace(/'/g,"\\'")}">${o}</div>`).join('')}<div class="quiz-fb" id="fb_${cid}"></div>`;c.querySelectorAll('.quiz-opt').forEach(o=>o.addEventListener('click',function(){selectOpt(parseInt(this.dataset.idx),parseInt(this.dataset.correct),this.dataset.exp,cid)}))}
        function selectOpt(sel,cor,exp,cid){const c=document.getElementById(cid);c.querySelectorAll('.quiz-opt').forEach((o,i)=>{o.style.pointerEvents='none';if(i===cor)o.classList.add('chosen-correct');if(i===sel&&i!==cor)o.classList.add('chosen-wrong')});if(sel===cor)quizScore++;const fb=document.getElementById('fb_'+cid);fb.innerHTML=`<p style="font-weight:600;">${sel===cor?'✅ 正确！':'❌ 记错了'}</p><p style="font-size:11px;">${exp}</p><button class="btn-next-q" id="nxt_${cid}">下一题 →</button>`;fb.classList.add('show');document.getElementById('nxt_'+cid).addEventListener('click',()=>{quizIndex++;showQ((currentData.quiz||[])[quizIndex]||null,cid)})}
        function submitMsg(){const i=document.getElementById('messageInput');const t=i.value.trim();if(!t){showToast('请输入留言内容');return}const l=document.getElementById('messageList');const item=document.createElement('div');item.className='msg-item';item.innerHTML=`<div class="msg-author">${currentName}</div><div>${t}</div>`;l.children.length>1?l.insertBefore(item,l.children[1]):l.appendChild(item);i.value='';localStorage.setItem('msg_'+currentName,l.innerHTML);spawnPlane()}
        function loadMsgs(){const c=localStorage.getItem('msg_'+currentName);if(c)document.getElementById('messageList').innerHTML=c}
        function spawnPlane(){const plane=document.createElement('div');plane.className='paper-plane';plane.textContent='✈️';const btn=document.querySelector('.btn-sub');if(!btn)return;const rect=btn.getBoundingClientRect();plane.style.top=rect.top+'px';plane.style.left=rect.right-30+'px';document.body.appendChild(plane);setTimeout(()=>plane.remove(),1600)}
        function openTicket(){setParticleSpeed(2.5);const overlay=document.createElement('div');overlay.className='ticket-overlay';const role=roleData[currentName]||{};const kwStr=(role.keywords||[]).map(k=>`<span style="display:inline-block;background:rgba(123,140,255,.15);color:#7B8CFF;padding:3px 10px;border-radius:12px;font-size:10px;margin:2px 4px;">${k}</span>`).join('');overlay.innerHTML=`<div class="ticket-paper"><div class="ticket-inner"><div class="ticket-particles" id="ticketParticles"></div><button class="ticket-close" onclick="this.closest('.ticket-overlay').remove();setParticleSpeed(1)">✕</button><div class="ticket-role-icon">${role.icon||'🎫'}</div><div class="ticket-role-label">${role.label||''}</div><div style="margin:4px 0 10px;">${kwStr}</div><div class="ticket-souvenir"><div class="souv-names">沈立文 × ${currentName}</div><div class="souv-tag">${currentData.tag}</div><div class="souv-meta">${currentData.souvenirMeta||''}</div></div><div class="ticket-body">${currentData.sayWords||'愿青春不散场。'}</div><div class="ticket-sign">— 沈立文</div><div class="ticket-stars">✦ ✦ ✦ ✦ ✦</div></div></div>`;document.body.appendChild(overlay);overlay.addEventListener('click',e=>{if(e.target===overlay){overlay.remove();setParticleSpeed(1)}});const pc=document.getElementById('ticketParticles');for(let i=0;i<16;i++){const p=document.createElement('div');p.className='ticket-particle';p.style.left=Math.random()*90+'%';p.style.top=Math.random()*80+'%';p.style.animationDelay=Math.random()*2+'s';p.style.animationDuration=(Math.random()*2+3)+'s';pc.appendChild(p)}}
        function setParticleSpeed(mult){particleSpeedMultiplier=mult}
        document.addEventListener('click',function(e){const r=document.createElement('div');r.className='ripple';r.style.left=e.clientX+'px';r.style.top=e.clientY+'px';r.style.background='rgba(180,160,220,.3)';r.style.boxShadow='0 0 0 4px rgba(180,160,220,.15)';document.body.appendChild(r);setTimeout(()=>r.remove(),700)});
        (function initParticles(){const canvas=document.getElementById('particleCanvas');const ctx=canvas.getContext('2d');let w,h;const particles=[];const colors=['#6CB4EE','#7B8CFF','#A78BFA','#D4A5FF','#FF9A9E','#FFB7B2','#FFCD56','#81D4FA','#CE93D8','#90CAF9'];function rs(){w=window.innerWidth;h=window.innerHeight;canvas.width=w;canvas.height=h}function mk(){return{x:Math.random()*w,y:h+Math.random()*60,size:Math.random()*3+1.2,speedY:Math.random()*.45+.2,speedX:(Math.random()-.5)*.25,color:colors[Math.floor(Math.random()*colors.length)],opacity:Math.random()*.55+.3,pulse:Math.random()*Math.PI*2,pulseSpeed:Math.random()*.025+.01}}function init(){rs();for(let i=0;i<45;i++){const p=mk();p.y=Math.random()*h;particles.push(p)}}function draw(p){p.pulse+=p.pulseSpeed;const s=p.size*(1+Math.sin(p.pulse)*.3),o=p.opacity*(.5+Math.sin(p.pulse)*.5);const g1=ctx.createRadialGradient(p.x,p.y,0,p.x,p.y,s*7);g1.addColorStop(0,p.color+'55');g1.addColorStop(.4,p.color+'18');g1.addColorStop(1,'transparent');ctx.globalAlpha=o*.45;ctx.fillStyle=g1;ctx.beginPath();ctx.arc(p.x,p.y,s*7,0,Math.PI*2);ctx.fill();const g2=ctx.createRadialGradient(p.x,p.y,0,p.x,p.y,s*2.5);g2.addColorStop(0,p.color+'DD');g2.addColorStop(.4,p.color+'80');g2.addColorStop(1,'transparent');ctx.globalAlpha=o;ctx.fillStyle=g2;ctx.beginPath();ctx.arc(p.x,p.y,s*2.5,0,Math.PI*2);ctx.fill();ctx.globalAlpha=o*.85;ctx.fillStyle='#FFF';ctx.beginPath();ctx.arc(p.x,p.y,s*.5,0,Math.PI*2);ctx.fill();ctx.globalAlpha=1}function upd(p){p.y-=p.speedY*particleSpeedMultiplier;p.x+=p.speedX;if(p.y<-20){p.y=h+Math.random()*40;p.x=Math.random()*w;p.color=colors[Math.floor(Math.random()*colors.length)]}if(p.x<-20)p.x=w+20;if(p.x>w+20)p.x=-20}function animate(){ctx.clearRect(0,0,w,h);ctx.fillStyle='rgba(254,252,249,.03)';ctx.fillRect(0,0,w,h);for(const p of particles){upd(p);draw(p)}requestAnimationFrame(animate)}window.addEventListener('resize',()=>{rs();particles.length=0;for(let i=0;i<45;i++)particles.push(mk())});init();animate();})();
        (function initSparks(){const c=document.getElementById('sparksContainer');if(!c)return;const cls=['#FFCD56','#FF9A9E','#6CB4EE','#D4A5FF'];for(let i=0;i<20;i++){const s=document.createElement('div');s.className='shutter-spark';const a=Math.random()*Math.PI*2,d=Math.random()*100+40;s.style.setProperty('--dx',Math.cos(a)*d+'px');s.style.setProperty('--dy',Math.sin(a)*d+'px');s.style.animationDelay=Math.random()*.35+'s';s.style.top='50%';s.style.left='50%';s.style.background=cls[Math.floor(Math.random()*cls.length)];s.style.boxShadow=`0 0 12px 4px ${s.style.background}`;c.appendChild(s)}})();
        (function initStars(){const c=document.getElementById('starsContainer');if(!c)return;for(let i=0;i<16;i++){const s=document.createElement('div');s.className='star-burst';const a=Math.random()*Math.PI*2,d=Math.random()*140+60;s.style.setProperty('--sx',Math.cos(a)*d+'px');s.style.setProperty('--sy',Math.sin(a)*d+'px');s.style.animationDelay=Math.random()*.4+.15+'s';s.style.top='50%';s.style.left='50%';const sz=Math.random()*4+2;s.style.width=sz+'px';s.style.height=sz+'px';c.appendChild(s)}})();
        setTimeout(()=>{const c=document.getElementById('cameraStage');if(c)c.remove()},5200);
    </script>
