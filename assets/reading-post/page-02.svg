<svg xmlns="http://www.w3.org/2000/svg" width="1242" height="2208" viewBox="0 0 1242 2208">
  <defs>
    <filter id="paperShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="14" stdDeviation="22" flood-color="#d9d0c4" flood-opacity="0.28"/>
    </filter>
  </defs>
  <rect width="100%" height="100%" fill="#f6f0e8"/>
  <rect x="54" y="54" width="1134" height="2100" rx="46" fill="#fffdf8" filter="url(#paperShadow)"/>
  <rect x="82" y="82" width="1078" height="2044" rx="34" fill="none" stroke="#eadfce" stroke-width="2"/>
  <style>
    .body { font-family: 'Noto Serif CJK SC', 'Source Han Serif SC', 'Songti SC', 'SimSun', serif; font-size: 34px; fill: #302820; letter-spacing: 0.8px; }
  </style>
  <text x="108" y="120" class="body" xml:space="preserve">二、专业课2【马中化】</text>
<text x="108" y="176" class="body" xml:space="preserve">上来先讲专业课二，因为26年比较特殊，题目相较之前的比较偏，</text>
<text x="108" y="232" class="body" xml:space="preserve">在考场上看到题目容易傻眼，出分后看到分数可能也会傻眼hh。</text>
<text x="108" y="288" class="body" xml:space="preserve">倒也不是无法准备，就是覆盖面需要更大一点，需要大家准备的知识</text>
<text x="108" y="344" class="body" xml:space="preserve">点更加全面扎实，不能想着这不考就不背了！</text>
<text x="108" y="400" class="body" xml:space="preserve">①“毛中特”大家第一章～第五章最好是都背了，后面的章节简单准</text>
<text x="108" y="456" class="body" xml:space="preserve">备即可【今年毛中特就考了个冷门的考点】</text>
<text x="108" y="512" class="body" xml:space="preserve">②“新思想”肯定是重点。</text>
<text x="108" y="568" class="body" xml:space="preserve">新思想的分数远不止在专业课2的占比，专业课1马原的两道论述题</text>
<text x="108" y="624" class="body" xml:space="preserve">基本上都要结合新思想的内容，所以新思想还要灵活运用，学会迁移</text>
<text x="108" y="680" class="body" xml:space="preserve">。</text>
<text x="108" y="736" class="body" xml:space="preserve">不过新思想很难背！可以先搭框架，后续再填内容，至于内容填到哪</text>
<text x="108" y="792" class="body" xml:space="preserve">种程度，可以结合时政热点或者出题规律来。有时候还会考察导论+X</text>
<text x="108" y="848" class="body" xml:space="preserve">X的六大思想。</text>
<text x="108" y="904" class="body" xml:space="preserve">③“近代史纲要”这本书其实不可以忽视。26年明显占比提高了，</text>
<text x="108" y="960" class="body" xml:space="preserve">不过以课后习题为准就可以，而且可以晚点开，太早了记不住。</text>
<text x="108" y="1016" class="body" xml:space="preserve">④几本小册子，其实前两个小册子已经融入到新思想教材里面了。只</text>
<text x="108" y="1072" class="body" xml:space="preserve">有第三个小册子是24年的时政热点，这个可以单独准备一下。</text>
<text x="108" y="1128" class="body" xml:space="preserve">⑤以及一些答题技巧和时政热点大家在后期也要学习，只有知识点是</text>
<text x="108" y="1184" class="body" xml:space="preserve">不够的。</text>
<text x="108" y="1240" class="body" xml:space="preserve">⑥【在后面简单列举了一些答题模版】</text>
<text x="108" y="1296" class="body" xml:space="preserve">总体来说，专业课二的书比较多，准备范围比较广，不能掉以轻心！</text>
<text x="108" y="1374" class="body" xml:space="preserve">三、专业课1【马原】</text>
<text x="108" y="1430" class="body" xml:space="preserve">①这本书需要疯狂的背课本，知识点这一块大家背好就行</text>
<text x="108" y="1486" class="body" xml:space="preserve">②答题的话，出现原题的概率比较大，大家可以多多关注近年真题</text>
<text x="108" y="1542" class="body" xml:space="preserve">③同时学校其实出题也变灵活了，他会考察一点点马原著的内容，可</text>
<text x="108" y="1598" class="body" xml:space="preserve">能是为了区分。不是让大家去背别的书，而是书里面比如关于马原著</text>
<text x="108" y="1654" class="body" xml:space="preserve">的内容，大家可以也看一看。【比如为什么说马克思主义是批判的革</text>
<text x="108" y="1710" class="body" xml:space="preserve">命的？两个必然和两个决不会这种，其实是马原著里面考的比较多】</text>
<text x="108" y="1766" class="body" xml:space="preserve">④论述题需结合新思想，还是那句话，要学会知识迁移和一定的模版</text>
<text x="108" y="1822" class="body" xml:space="preserve">咯！</text>
</svg>
