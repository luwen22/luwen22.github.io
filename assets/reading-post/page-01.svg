<svg xmlns="http://www.w3.org/2000/svg" width="1242" height="2208" viewBox="0 0 1242 2208">
  <defs>
    <filter id="paperShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="14" stdDeviation="22" flood-color="#d9d0c4" flood-opacity="0.28"/>
    </filter>
  </defs>
  <rect width="100%" height="100%" fill="#f6f0e8"/>
  <rect x="54" y="54" width="1134" height="2100" rx="46" fill="#fffdf8" filter="url(#paperShadow)"/>
  <rect x="82" y="82" width="1078" height="2044" rx="34" fill="none" stroke="#eadfce" stroke-width="2"/>
  <style>
    .body { font-family: 'Noto Serif CJK SC', 'Source Han Serif SC', 'Songti SC', 'SimSun', serif; font-size: 34px; fill: #302820; letter-spacing: 0.8px; }
  </style>
  <text x="108" y="120" class="body" xml:space="preserve">本人是26思政方向的，初试全院第二，复试全院第一。</text>
<text x="108" y="198" class="body" xml:space="preserve">首先是特别感谢一批人！感谢学姐和学长一年多的帮助和支持，还有</text>
<text x="108" y="254" class="body" xml:space="preserve">初试结束后焦虑但加油打气的一起上岸的伙伴们，期待跟大家的见面</text>
<text x="108" y="310" class="body" xml:space="preserve">和相处！</text>
<text x="108" y="388" class="body" xml:space="preserve">一、择校</text>
<text x="108" y="444" class="body" xml:space="preserve">大家选择安农马理论的原因可以是：</text>
<text x="108" y="500" class="body" xml:space="preserve">①在合肥地理位置好</text>
<text x="108" y="556" class="body" xml:space="preserve">②给分友好不压分（虽然26专业2有点）</text>
<text x="108" y="612" class="body" xml:space="preserve">③备考压力相对较小，求稳</text>
<text x="108" y="668" class="body" xml:space="preserve">但有的小伙伴也要思考一下跨考后就业的问题，其它的可以放心选择</text>
<text x="108" y="724" class="body" xml:space="preserve">安农。</text>
</svg>
