<svg xmlns="http://www.w3.org/2000/svg" width="1242" height="2208" viewBox="0 0 1242 2208">
  <defs>
    <filter id="paperShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="14" stdDeviation="22" flood-color="#d9d0c4" flood-opacity="0.28"/>
    </filter>
  </defs>
  <rect width="100%" height="100%" fill="#f6f0e8"/>
  <rect x="54" y="54" width="1134" height="2100" rx="46" fill="#fffdf8" filter="url(#paperShadow)"/>
  <rect x="82" y="82" width="1078" height="2044" rx="34" fill="none" stroke="#eadfce" stroke-width="2"/>
  <style>
    .body { font-family: 'Noto Serif CJK SC', 'Source Han Serif SC', 'Songti SC', 'SimSun', serif; font-size: 34px; fill: #302820; letter-spacing: 0.8px; }
  </style>
  <text x="108" y="120" class="body" xml:space="preserve">四、英语</text>
<text x="108" y="176" class="body" xml:space="preserve">英语这门学科，要看大家各自的基础。当然四级没过的，也可以在备</text>
<text x="108" y="232" class="body" xml:space="preserve">战考研中四六级一次过，真的可以！</text>
<text x="108" y="288" class="body" xml:space="preserve">1.单词</text>
<text x="108" y="344" class="body" xml:space="preserve">①英语前期一直背单词，记得复习。然后中后期可以补充背一下配套</text>
<text x="108" y="400" class="body" xml:space="preserve">的词组。其实我的超纲词没背，大家先把核心词和基础词一定要一直</text>
<text x="108" y="456" class="body" xml:space="preserve">巩固到考前就是最稳的！</text>
<text x="108" y="512" class="body" xml:space="preserve">②单词不需要跟老师，也不用看什么带背浪费时间，就跟着单词app</text>
<text x="108" y="568" class="body" xml:space="preserve">一直背就行，一定要每天都要复习+背单词</text>
<text x="108" y="624" class="body" xml:space="preserve">￼</text>
<text x="108" y="680" class="body" xml:space="preserve">2.语法</text>
<text x="108" y="736" class="body" xml:space="preserve">①语法的话大家可以看看斌斌66句或者monkey百句【仅限前期，最</text>
<text x="108" y="792" class="body" xml:space="preserve">好是六月前结束】</text>
<text x="108" y="848" class="body" xml:space="preserve">②就是你学长难句，最好是每天都学，不会就学一点，因为你学长难</text>
<text x="108" y="904" class="body" xml:space="preserve">句的目的，是为了后面能看懂阅读。不是真的为了学语法而学语法，</text>
<text x="108" y="960" class="body" xml:space="preserve">因为考试不考语法。不影响你阅读的语法都可以不学。</text>
<text x="108" y="1016" class="body" xml:space="preserve">③斌斌的可以看到盗版课也可以买正版课188，考得好，成绩出来后</text>
<text x="108" y="1072" class="body" xml:space="preserve">还可以发小红书给你返现学费。</text>
<text x="108" y="1128" class="body" xml:space="preserve">④monkey主要是买他的百句实战的语法书，然后在b站看配套的免</text>
<text x="108" y="1184" class="body" xml:space="preserve">费课。</text>
<text x="108" y="1240" class="body" xml:space="preserve">⑤我看的是monkey的语法，但是斌斌的比较火，看你自己，你可以</text>
<text x="108" y="1296" class="body" xml:space="preserve">都听一下这两个老师的一节课几十分钟，喜欢哪种就去听】</text>
<text x="108" y="1352" class="body" xml:space="preserve">3.阅读：老师太多，很多人跟的唐迟，斌斌，柴荣。我跟的还是mon</text>
<text x="108" y="1408" class="body" xml:space="preserve">key，跟了他暑期的强化阅读，以及开学后的冲刺阅读</text>
<text x="108" y="1486" class="body" xml:space="preserve">4.小三门：完形填空易熙人，翻译和新题型我还是monkey，但是其</text>
<text x="108" y="1542" class="body" xml:space="preserve">实还有一些出名的老师，小三门可以八月或者九月开始</text>
<text x="108" y="1620" class="body" xml:space="preserve">5.作文：我跟的是周思成，大概十月中旬开始</text>
</svg>
