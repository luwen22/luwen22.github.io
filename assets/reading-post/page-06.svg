<svg xmlns="http://www.w3.org/2000/svg" width="1242" height="2208" viewBox="0 0 1242 2208">
  <defs>
    <filter id="paperShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="14" stdDeviation="22" flood-color="#d9d0c4" flood-opacity="0.28"/>
    </filter>
  </defs>
  <rect width="100%" height="100%" fill="#f6f0e8"/>
  <rect x="54" y="54" width="1134" height="2100" rx="46" fill="#fffdf8" filter="url(#paperShadow)"/>
  <rect x="82" y="82" width="1078" height="2044" rx="34" fill="none" stroke="#eadfce" stroke-width="2"/>
  <style>
    .body { font-family: 'Noto Serif CJK SC', 'Source Han Serif SC', 'Songti SC', 'SimSun', serif; font-size: 34px; fill: #302820; letter-spacing: 0.8px; }
  </style>
  <text x="108" y="120" class="body" xml:space="preserve">②在多个逻辑：</text>
<text x="108" y="176" class="body" xml:space="preserve">一、简答题</text>
<text x="108" y="232" class="body" xml:space="preserve">                          1.题目中间写</text>
<text x="108" y="288" class="body" xml:space="preserve">       综述：</text>
<text x="108" y="344" class="body" xml:space="preserve">       （1）xxxxxx【简答的标题可以不是核心句】</text>
<text x="108" y="400" class="body" xml:space="preserve">      （有段内综述就写，没有就不写）</text>
<text x="108" y="456" class="body" xml:space="preserve">       第一，xxxxxxxxxxxxxxxxxxxxxxxx，xxxxxxxxx。</text>
<text x="108" y="512" class="body" xml:space="preserve">       第二，xxxxxxxxxxxxxxxxxxxxxxxx，xxxxxxxxx。</text>
<text x="108" y="568" class="body" xml:space="preserve">       （2）xxxxxx</text>
<text x="108" y="624" class="body" xml:space="preserve">       第一，xxxxxxxxxxxxxxxxxxxxxxxx，xxxxxxxx</text>
<text x="108" y="680" class="body" xml:space="preserve">       总结：</text>
<text x="108" y="758" class="body" xml:space="preserve">5.论述题：</text>
<text x="108" y="814" class="body" xml:space="preserve">                    1.题目中间写（论述题题目只抄核心部分）</text>
<text x="108" y="870" class="body" xml:space="preserve">     xxxxxxxxxxxxxxx。（总引入，需详细写abc）</text>
<text x="108" y="926" class="body" xml:space="preserve">    （一）xxxxxxxx（论述题必须为核心句）</text>
<text x="108" y="982" class="body" xml:space="preserve">     xxxxxxxxxxxx（段内引入）【但如果是马原理解释xx，这里</text>
<text x="108" y="1038" class="body" xml:space="preserve">的段内引入放上原理即可】</text>
<text x="108" y="1094" class="body" xml:space="preserve">      第一，xxxxxxxxxxxxxxxxxxxxxxxx，xxxxxxxxx。</text>
<text x="108" y="1150" class="body" xml:space="preserve">      第二，xxxxxxxxxxxxxxxxxxxxxxxx，xxxxxxxxx。</text>
<text x="108" y="1206" class="body" xml:space="preserve">     （二）xxxxxx</text>
<text x="108" y="1262" class="body" xml:space="preserve">     xxxxxxxxxxxx（段内引入）</text>
<text x="108" y="1318" class="body" xml:space="preserve">       第一，xxxxxxxxxxxxxxxxxxxxxxxx，xxxxxxxx</text>
<text x="108" y="1374" class="body" xml:space="preserve">      综上所述，xxxxxxxxxx。</text>
<text x="108" y="1452" class="body" xml:space="preserve">七、模拟</text>
<text x="108" y="1508" class="body" xml:space="preserve">专业课后期一定要进行模拟，可以自己押题，我当时马原就基本上都</text>
<text x="108" y="1564" class="body" xml:space="preserve">押中了。也可以去看看比较火的机构冲刺阶段出的资料。然后也可以</text>
<text x="108" y="1620" class="body" xml:space="preserve">找学长学姐去帮忙看一下自己答题有无问题！</text>
</svg>
